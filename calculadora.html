<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora TMB + Plano Alimentar — Gabriel Totino</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg:      #FAFAF8;
    --bg2:     #F4F2EE;
    --bg3:     #ECEAE5;
    --border:  #E0DDD7;
    --text:    #1A1A1A;
    --muted:   #6B7280;
    --light:   #9CA3AF;
    --accent:  #F05A28;
    --accent2: #C44A1E;
    --white:   #FFFFFF;
    --success: #2E7D4F;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--white);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin   { to{transform:rotate(360deg)} }
  @keyframes barFill{ from{width:0} }
  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.5} }

  .site-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex; justify-content:space-between; align-items:center;
    position: sticky; top:0; z-index:100;
    box-shadow: 0 2px 16px rgba(0,0,0,.05);
  }

  .logo { display:flex; align-items:center; gap:14px; }
  .logo-mark {
    width:38px; height:38px; position:relative;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-mark::before,.logo-mark::after,
  .logo-mark .lm-bl,.logo-mark .lm-tr {
    content:''; position:absolute; width:10px; height:10px;
  }
  .logo-mark::before{top:0;left:0;border-top:2px solid var(--text);border-left:2px solid var(--text);}
  .logo-mark::after {bottom:0;right:0;border-bottom:2px solid var(--text);border-right:2px solid var(--text);}
  .logo-mark .lm-bl{bottom:0;left:0;border-bottom:2px solid var(--text);border-left:2px solid var(--text);}
  .logo-mark .lm-tr{top:0;right:0;border-top:2px solid var(--text);border-right:2px solid var(--text);}
  .logo-mark span { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:900; color:var(--accent); }
  .logo-text .logo-name { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:700; color:var(--text); letter-spacing:3px; }
  .logo-text .logo-sub  { font-size:11px; color:var(--accent); letter-spacing:4px; text-transform:uppercase; margin-top:1px; }

  .header-badge {
    display:flex; align-items:center; gap:7px;
    border:1.5px solid rgba(240,90,40,.35); padding:6px 14px;
    background:rgba(240,90,40,.05);
  }
  .hb-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  .header-badge span { font-size:11px; color:var(--accent); letter-spacing:4px; text-transform:uppercase; font-weight:500; }

  .hero {
    padding: 72px 40px 56px;
    text-align: center;
    background: linear-gradient(150deg, #FFFFFF 55%, #FEF0EA 100%);
    position: relative; overflow: hidden;
  }
  .hero::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(to right, transparent, var(--accent), transparent); }
  .hero-ring { position:absolute; border-radius:50%; border:1px solid rgba(240,90,40,.08); pointer-events:none; }
  .r1{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .r2{width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.5;}

  .hero-label { font-size:11px; color:var(--accent); letter-spacing:6px; text-transform:uppercase; margin-bottom:18px; display:block; position:relative; z-index:2; font-weight:500; }
  .hero-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(40px,6vw,72px); font-weight:900;
    color:var(--text); letter-spacing:2px; text-transform:uppercase; line-height:1;
    margin-bottom:18px; position:relative; z-index:2;
  }
  .hero-title .acc { color:var(--accent); }
  .hero-desc {
    font-size:16px; color:var(--muted); font-weight:300; max-width:520px;
    margin:0 auto; line-height:1.7; position:relative; z-index:2;
  }

  .main { max-width:780px; margin:0 auto; padding:0 24px 80px; }

  .card {
    background:var(--white); border:1px solid var(--border);
    padding:40px; margin-top:28px;
    box-shadow:0 2px 16px rgba(0,0,0,.05);
  }
  .card-header { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
  .card-step {
    width:28px; height:28px; background:var(--accent); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900; color:#fff;
  }
  .card-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:var(--text); letter-spacing:2px; text-transform:uppercase; }

  .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; color:var(--accent); letter-spacing:4px; text-transform:uppercase; font-weight:500; }
  .field input, .field select {
    background:var(--bg2); border:1.5px solid var(--border);
    color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:15px; padding:11px 14px; outline:none;
    transition:border-color .2s; border-radius:0; -webkit-appearance:none;
  }
  .field input:focus,.field select:focus { border-color:var(--accent); background:var(--white); }

  .btn-calc {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--accent); color:#fff;
    font-family:'DM Sans',sans-serif; font-weight:500; font-size:15px;
    padding:14px 32px; border:none; cursor:pointer;
    transition:background .2s;
    width:100%; justify-content:center;
  }
  .btn-calc:hover { background:var(--accent2); }

  .btn-download {
    display:none; align-items:center; gap:10px;
    background:var(--white); border:1.5px solid var(--success);
    color:var(--success);
    padding:12px 24px; width:100%; justify-content:center; margin-top:12px;
  }

  .results { display:none; }
  .results.visible { display:block; }

  .ai-result { display:none; }
  .ai-result.visible { display:block; }

</style>
</head>
<body>

<div class="main">

<button class="btn-calc" onclick="calcularTMB()">Calcular</button>

<textarea id="foods-input"></textarea>

<button class="btn-calc" onclick="gerarDieta()">Gerar dieta</button>

<pre id="ai-content"></pre>

</div>

<script>

var dadosCalculo = {};

function calcularTMB() {
  dadosCalculo = {
    meta: 2000,
    protG: 150,
    carbG: 200,
    fatG: 60
  };
}

function gerarDieta() {
  var foods = document.getElementById('foods-input').value.trim();

  if (!foods) {
    alert('Liste alimentos');
    return;
  }

  var lista = foods.split(',');

  function pick(){
    return lista[Math.floor(Math.random()*lista.length)];
  }

  var dieta =
"PLANO\n\n" +
"Café: " + pick() + "\n" +
"Almoço: " + pick() + "\n" +
"Jantar: " + pick();

  document.getElementById('ai-content').innerText = dieta;
}

</script>

</body>
</html>
