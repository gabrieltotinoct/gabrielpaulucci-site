<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora TMB + Plano Alimentar</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  background:#F05A28;
  color:#fff;
  border:none;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:#eee;
  padding:15px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>Calculadora de Dieta</h2>

<select id="sexo">
<option value="m">Masculino</option>
<option value="f">Feminino</option>
</select>

<input type="number" id="idade" placeholder="Idade">
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="altura" placeholder="Altura (cm)">

<select id="atividade">
<option value="1.2">Sedentário</option>
<option value="1.55">Moderado</option>
<option value="1.9">Intenso</option>
</select>

<select id="objetivo">
<option value="perda">Emagrecer</option>
<option value="manutencao">Manter</option>
<option value="massa">Ganhar massa</option>
</select>

<button onclick="calcular()">Calcular</button>

<textarea id="foods" placeholder="Digite alimentos (ex: arroz, frango, ovo)"></textarea>

<button onclick="gerar()">Gerar dieta</button>

<div class="result" id="resultado"></div>

</div>

<script>

var dados = {};

function calcular(){
  var sexo = document.getElementById('sexo').value;
  var idade = document.getElementById('idade').value;
  var peso = document.getElementById('peso').value;
  var altura = document.getElementById('altura').value;
  var atividade = document.getElementById('atividade').value;
  var objetivo = document.getElementById('objetivo').value;

  var tmb = sexo == "m"
    ? 10*peso + 6.25*altura - 5*idade + 5
    : 10*peso + 6.25*altura - 5*idade - 161;

  var tdee = tmb * atividade;

  var meta = objetivo=="perda" ? tdee-400 :
             objetivo=="massa" ? tdee+300 :
             tdee;

  var prot = peso*2;
  var fat = (meta*0.25)/9;
  var carb = (meta - prot*4 - fat*9)/4;

  dados = {
    meta: Math.round(meta),
    prot: Math.round(prot),
    carb: Math.round(carb),
    fat: Math.round(fat)
  };

  alert("Calorias: " + dados.meta);
}

function gerar(){
  var foods = document.getElementById('foods').value;
  if(!foods){ alert("Digite alimentos"); return; }

  var lista = foods.split(',');

  function pick(){
    return lista[Math.floor(Math.random()*lista.length)];
  }

  var kcal = Math.round(dados.meta/5);

  var dieta =
`PLANO ALIMENTAR

Calorias: ${dados.meta}
Proteína: ${dados.prot}g
Carbo: ${dados.carb}g
Gordura: ${dados.fat}g

Café da manhã:
- ${pick()} + ${pick()}

Almoço:
- ${pick()} + ${pick()}

Jantar:
- ${pick()} + ${pick()}

Dica: beba água e mantenha consistência.`;

  document.getElementById('resultado').innerText = dieta;
}

</script>

</body>
</html>
