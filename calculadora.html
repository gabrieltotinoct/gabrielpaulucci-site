<script>
var dadosCalculo = {};

function calcularTMB() {
  var sexo   = document.getElementById('sexo').value;
  var idade  = parseFloat(document.getElementById('idade').value);
  var peso   = parseFloat(document.getElementById('peso').value);
  var altura = parseFloat(document.getElementById('altura').value);
  var fat    = parseFloat(document.getElementById('atividade').value);
  var obj    = document.getElementById('objetivo').value;

  if (!idade || !peso || !altura) {
    alert('Preencha todos os campos.');
    return;
  }

  var tmb = sexo === 'm'
    ? 10*peso + 6.25*altura - 5*idade + 5
    : 10*peso + 6.25*altura - 5*idade - 161;

  var tdee = tmb * fat;
  var meta = obj === 'perda' ? Math.round(tdee-400)
            : obj === 'massa' ? Math.round(tdee+300)
            : Math.round(tdee);

  var protG = Math.round(peso*2);
  var fatG  = Math.round((meta*0.25)/9);
  var carbG = Math.round((meta - protG*4 - fatG*9)/4);

  document.getElementById('r-tmb').textContent  = Math.round(tmb);
  document.getElementById('r-tdee').textContent = Math.round(tdee);
  document.getElementById('r-meta').textContent = meta;

  document.getElementById('r-prot').textContent = protG+'g';
  document.getElementById('r-carb').textContent = carbG+'g';
  document.getElementById('r-fat').textContent  = fatG+'g';

  document.getElementById('r-prot-k').textContent = (protG*4)+' kcal';
  document.getElementById('r-carb-k').textContent = (carbG*4)+' kcal';
  document.getElementById('r-fat-k').textContent  = (fatG*9)+' kcal';

  dadosCalculo = { meta, protG, carbG, fatG };

  document.getElementById('results').classList.add('visible');
  document.getElementById('food-section').style.display = 'block';
}

function gerarDieta() {
  var foods = document.getElementById('foods-input').value.trim();

  if (!foods) {
    alert('Digite os alimentos');
    return;
  }

  if (!dadosCalculo.meta) {
    alert('Calcule primeiro');
    return;
  }

  var lista = foods.split(',');

  function pick(){
    return lista[Math.floor(Math.random()*lista.length)];
  }

  var kcal = Math.round(dadosCalculo.meta / 5);

  var dieta =
`📅 PLANO ALIMENTAR

🔥 Meta: ${dadosCalculo.meta} kcal
🥩 Proteína: ${dadosCalculo.protG}g
🍞 Carbo: ${dadosCalculo.carbG}g
🥑 Gordura: ${dadosCalculo.fatG}g

────────────────────

☀️ Café da manhã
- ${pick()} + ${pick()}

🍎 Lanche da manhã
- ${pick()} + ${pick()}

🍛 Almoço
- ${pick()} + ${pick()}

🍌 Lanche da tarde
- ${pick()} + ${pick()}

🌙 Jantar
- ${pick()} + ${pick()}

────────────────────

💡 Dica:
Beba água e mantenha consistência.`;

  document.getElementById('ai-content').textContent = dieta;
  document.getElementById('ai-result').classList.add('visible');
  document.getElementById('btn-download').style.display = 'flex';
}
</script>
